#
# PROJECT:    Surge (formerly Brain Loader v4)
# REPO:       https://github.com/Ehsas317/surge
# WHAT:       Wave-based parallel dispatch across multiple backends.
#             A surge is simultaneous and forceful.
#
# THIS FILE:
#   Configuration for the Surge parallel dispatch orchestrator.
#   Defines provider APIs, routing rules, and wave parameters.
#
# HOW TO USE SURGE:
#   1. Install:    pip install -r requirements.txt
#   2. Configure:  Copy to config.yaml, add your API tokens
#   3. Run:        python main.py "Your project description"
#
# ═══════════════════════════════════════════════════════════════════════════

# ============================================================
# SURGE CONFIGURATION
# ============================================================
# Hardware: MacBook Pro M1 Max 32GB (25GB allocated)
# Parallel dispatch across multiple LLM backends
# ============================================================

app_name: "surge"

# Wave configuration
wave:
  max_concurrent: 4  # Max parallel tasks
  timeout_seconds: 120  # Per-wave timeout
  retry_attempts: 2

# Provider configurations
providers:
  deepseek:
    api_key: "YOUR_DEEPSEEK_KEY"
    model: "deepseek-chat"
    endpoint: "https://api.deepseek.com/v1"
    priority: 1  # Lower = preferred
    cost_per_1k: 0.50

  mistral:
    api_key: "YOUR_MISTRAL_KEY"
    model: "mistral-small"
    endpoint: "https://api.mistral.ai/v1"
    priority: 2
    cost_per_1k: 2.00

  anthropic:
    api_key: "YOUR_ANTHROPIC_KEY"
    model: "claude-sonnet-4-20250514"
    endpoint: "https://api.anthropic.com/v1"
    priority: 3
    cost_per_1k: 3.00

  together:
    api_key: "YOUR_TOGETHER_KEY"
    model: "meta-llama/Llama-4-Maverick-17B"
    endpoint: "https://api.together.ai/v1"
    priority: 4
    cost_per_1k: 0.80

  local_mlx:
    type: "local"
    path: "./models/surge-q4.gguf"
    priority: 0  # Always try local first
    cost_per_1k: 0.0

# Routing rules
routing:
  default_provider: "deepseek"
  fallback_order: ["local_mlx", "deepseek", "mistral", "together", "anthropic"]
  cost_aware: true  # Route to cheapest available

# Telegram notifications
telegram:
  enabled: true
  bot_token: "YOUR_BOT_TOKEN"
  chat_id: "YOUR_CHAT_ID"

# Cost tracking
cost_tracking:
  enabled: true
  budget_limit: 10.0  # USD per project
  alert_threshold: 0.8  # Alert at 80% of budget
